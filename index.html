<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>css9-1</title>
</head>

<body>
    <div class="StartDiv">
        <div class="ColumnBarDiv">
            <div class="LogoDiv">
                <img src="images/Logo.png" alt="Logo">
            </div>
            <div class="AvatarDiv">
                <div class="AvatarRowDiv">
                    <img src="images/Avatar.svg" alt="Avatar">
                    <div class="AndrioCol">
                        <p>Andrio Richard</p>
                        <span>Student</span>
                    </div>
                </div>
                <img src="images/RightArrow.svg" alt="RightArrow">
            </div>
            <div class="MenuBarCol">
                <div class="MenuBarRow">
                    <img src="images/Dashboard.svg" alt="Dashboard">
                    <div>
                        <p>Dashboard</p>
                    </div>
                </div>
                <div class="MenuBarRow">
                    <img src="images/Courses.svg" alt="Courses">
                    <div>
                        <p>My Courses</p>
                    </div>
                </div>
                <div class="MenuBarRow">
                    <img src="images/label.svg" alt="label">
                    <div>
                        <p>Save Classes</p>
                    </div>
                </div>
                <div class="MenuBarRow">
                    <img src="images/Document.svg" alt="Document">
                    <div>
                        <p>Assignments</p>
                    </div>
                </div>
                <div class="MenuBarRow">
                    <img src="images/Test.svg" alt="Test">
                    <div>
                        <p>Test</p>
                    </div>
                </div>
                <div class="MenuBarRow">
                    <img src="images/Users.svg" alt="Users">
                    <div>
                        <p>Groups</p>
                    </div>
                </div>
                <div class="MenuBarRow">
                    <img src="images/Forum.svg" alt="Forum">
                    <div>
                        <p>Forum</p>
                    </div>
                </div>
            </div>
            <div class="AnalyticDiv">
                <div class="AnalyticDivCol">
                    <div class="MenuBarRow">
                        <img src="images/Analytics.svg" alt="Analytics">
                        <div>
                            <p>Analytics</p>
                        </div>
                    </div>
                    <div class="MenuBarRow">
                        <img src="images/Setting.svg" alt="Setting">
                        <div>
                            <p>Setting</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="ButtonsDiv">
                <img src="images/Leave.svg" alt="Leave">
                <div>
                    <button>Setting</button>
                </div>

            </div>
        </div>
        <div class="RowMainDiv">
            <div class="HeaderBarDiv">
                <div class="LearningDiv">
                    <p>Learning Paths</p>
                    <p>Create</p>
                    <p>Build</p>
                    <p>Thrive</p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
